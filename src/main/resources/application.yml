server:
  port: 8080

spring:
  datasource:
    # URL Supabase (Menggunakan Pooler port 6543)
    url: jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres?sslmode=require
    username: postgres.gvylodnmwcbwrbmdmwvy
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # Akan otomatis membuat/update tabel di Supabase
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Konfigurasi AI Agent (OpenRouter)
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.groq.com/openai/v1 # <--- URL Diubah ke Groq
      api-key: ${LANGCHAIN4J_OPEN_AI_CHAT_MODEL_API_KEY}
      model-name: llama-3.3-70b-versatile
      temperature: 0.0 # <--- Ubah ke 0 agar 100% fokus output JSON ketat
      max-tokens: 800
      timeout: PT120S

# Konfigurasi Market API (Twelve Data)
twelvedata:
  api-key: ${TWELVEDATA_API_KEY}
